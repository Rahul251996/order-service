spring.application.name=order-service
# ===============================
# SERVER CONFIG
# ===============================
server.port=8081


eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ===============================
# MYSQL DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3307/orderdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# KAFKA CONFIG
# ===============================
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
# ===============================
# ACTUATOR / MANAGEMENT
# ===============================
management.endpoints.web.exposure.include=health,info,metrics

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.example.order=DEBUG

###################################################
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8091/realms/quickshop-realm
logging.level.org.springframework.security=DEBUG

####################################################
spring.inventory.url=localhost:8082